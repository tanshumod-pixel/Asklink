```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Question</title>

<style>

body{
margin:0;
font-family: -apple-system,BlinkMacSystemFont,Segoe UI,Roboto;
background:linear-gradient(135deg,#ff7eb3,#ff758c);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
}

.card{
background:white;
width:92%;
max-width:380px;
border-radius:24px;
padding:35px;
box-shadow:0 20px 60px rgba(0,0,0,0.25);
text-align:center;
animation:cardEnter 0.6s ease;
}

@keyframes cardEnter{
0%{transform:scale(.7);opacity:0}
100%{transform:scale(1);opacity:1}
}

.profile{
width:90px;
height:90px;
border-radius:50%;
background:#ffd6e7;
margin:auto;
margin-bottom:15px;
display:flex;
align-items:center;
justify-content:center;
font-size:40px;
}

h1{
font-size:20px;
color:#ff2e75;
line-height:1.4;
}

.message{
margin-top:10px;
color:#666;
height:24px;
font-style:italic;
}

.buttons{
margin-top:25px;
}

button{
border:none;
border-radius:30px;
padding:14px 26px;
font-size:17px;
cursor:pointer;
margin:8px;
transition:0.25s;
}

#yes{
background:#ff2e75;
color:white;
box-shadow:0 10px 30px rgba(255,46,117,0.4);
}

#no{
background:#eee;
position:absolute;
}

.heart{
position:fixed;
bottom:-20px;
font-size:24px;
animation:float 5s linear infinite;
}

@keyframes float{
0%{transform:translateY(0)}
100%{transform:translateY(-900px)}
}

canvas{
position:fixed;
top:0;
left:0;
pointer-events:none;
}

</style>
</head>

<body>

<canvas id="fireworks"></canvas>

<div class="card" id="card">

<div class="profile">😊</div>

<h1>
Should this awesome guy who really like you and sent you this link get a fair chance to know you better and take you out on a date?😄
</h1>

<div class="message" id="msg"></div>

<div class="buttons">
<button id="yes" onclick="yesClicked()">Yes ✔️</button>
<button id="no">No ❌</button>
</div>

</div>

<script>

let yes=document.getElementById("yes");
let no=document.getElementById("no");
let msg=document.getElementById("msg");

let scale=1;

let teasing=[
"Are you sure? 😏",
"Think again...",
"Don't break his heart 🥺",
"You know you want to press YES",
"Give him a chance 😄",
"You can't escape that easily!"
];

function moveNo(){

let x=Math.random()*(window.innerWidth-100);
let y=Math.random()*(window.innerHeight-50);

no.style.left=x+"px";
no.style.top=y+"px";

scale+=0.35;
yes.style.transform="scale("+scale+")";

msg.innerHTML=teasing[Math.floor(Math.random()*teasing.length)];

}

no.addEventListener("mouseover",moveNo);
no.addEventListener("click",moveNo);
no.addEventListener("touchstart",moveNo);

function yesClicked(){

document.getElementById("card").innerHTML=
"<h1>🎉 Good choice!</h1><p>Thank you!! Promise i won't let you down!!😇</p>";

startFireworks();
hearts();

}

function hearts(){

setInterval(()=>{

let h=document.createElement("div");
h.className="heart";
h.innerHTML="🎉";

h.style.left=Math.random()*100+"vw";
h.style.fontSize=(Math.random()*20+20)+"px";

document.body.appendChild(h);

setTimeout(()=>h.remove(),5000);

},200);

}

const canvas=document.getElementById("fireworks");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let particles=[];

function createFirework(){

let x=Math.random()*canvas.width;
let y=Math.random()*canvas.height/2;

for(let i=0;i<80;i++){

particles.push({
x:x,
y:y,
angle:Math.random()*2*Math.PI,
speed:Math.random()*5+2,
life:100
});

}

}

function update(){

ctx.clearRect(0,0,canvas.width,canvas.height);

particles.forEach((p,i)=>{

p.x+=Math.cos(p.angle)*p.speed;
p.y+=Math.sin(p.angle)*p.speed;
p.life--;

ctx.fillStyle="hsl("+Math.random()*360+",100%,60%)";
ctx.fillRect(p.x,p.y,3,3);

if(p.life<=0)particles.splice(i,1);

});

requestAnimationFrame(update);

}

function startFireworks(){

setInterval(createFirework,600);

update();

}

</script>

</body>
</html>
